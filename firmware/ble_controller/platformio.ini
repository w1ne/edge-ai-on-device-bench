; PhoneWalker BLE controller firmware
; Target: Waveshare ESP32-S3 Zero (native USB-Serial/JTAG on GPIO19/20)
; Serves the live wire protocol (see docs/STATUS.md) over BLE instead of USB CDC.

[env:esp32s3_zero]
platform = espressif32@~6.8.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Waveshare ESP32-S3 Zero is a 4 MB / no-PSRAM board. The devkitc-1 target
; defaults to 8 MB + PSRAM; override explicitly.
board_build.flash_size = 4MB
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 4MB

; Exclude the diagnostic-only ADC scan file from the normal build.
build_src_filter = +<*> -<battery_scan.cpp>

; CDC-on-boot keeps VID/PID 303a:1001 on the native USB so the laptop's udev
; rules and the existing daemon pyusb detection still work for OTA handoff and
; programming. We do NOT use Serial for the wire protocol — BLE is the wire.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    ; Selects the driver implementation in servo_bus_feetech_sts.cpp.
    ; To wrap a different servo bus IC, add a sibling .cpp and flip this flag.
    -DSERVO_DRIVER_FEETECH_STS=1
    ; DEBUG_SERVO_PROBE=1 emits per-ID `[servo] probe id=X ReadPos=Y err=Z`
    ; lines at boot. Defaults ON; set to 0 in a production release if the
    ; extra ~100 ms of probe time is unwanted.
    -DDEBUG_SERVO_PROBE=1

lib_deps =
    h2zero/NimBLE-Arduino@~1.4.3
    bblanchon/ArduinoJson@~7.1.0
    adafruit/Adafruit MPU6050@~2.2.6
    adafruit/Adafruit Unified Sensor@~1.1.14
    ; Feetech half-duplex servo bus (STS/SMS).
    ; The stock "SCServo" package is not in the PIO registry; pull from GitHub.
    ftservo/FTServo@~2.0.0

; ---------------------------------------------------------------------------
; Diagnostic ADC sweep build.
;
; Boots, prints every ADC1 channel (GPIO 1..10) over USB CDC for ~10 s, then
; halts. NO BLE, NO servo bus, NO I2C. Used once to identify which GPIO the
; stock firmware wires to the battery divider.
;
; Flash via:
;   pio run -e esp32s3_zero_batscan --target upload
;   cat /dev/ttyACM0           # watch for [adc_scan] lines
;
; Re-flash the normal `esp32s3_zero` env to restore BLE functionality.
; ---------------------------------------------------------------------------
[env:esp32s3_zero_batscan]
extends = env:esp32s3_zero
build_src_filter = +<battery_scan.cpp>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DBATTERY_SCAN_DIAG=1
lib_deps =
